name: Cypress Tests

on: push

jobs:
  cypress-run:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          APP_URL: ${{ secrets.APP_URL }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        timeout-minutes: 15

      - name: Start application
        run: |
          npm run start &
          echo $! > .pidfile
        env:
          APP_URL: ${{ secrets.APP_URL }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

      - name: Cypress run
        run: npx cypress run
      - name: Stop application
        if: always()
        run: |
          if [ -f .pidfile ]; then
            kill $(cat .pidfile)
          fi
